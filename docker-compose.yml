version: '3.8'

services:
  # --- AUTHENTICATION ---
  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: school-keycloak
    # Updated: Added --import-realm to keep your settings alive
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-db:5432/school_mgmt
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: vedant@123
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      # This maps your exported JSON to the auto-import folder
      - ./realm-export.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "8081:8080"
    depends_on:
      - postgres-db

  # --- INFRASTRUCTURE ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: school-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: school-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres-db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: school_mgmt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vedant@123
    volumes:
      # Added: This saves your students/users so they survive a restart
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # --- YOUR APPLICATIONS ---
  backend-api:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: school-backend
    depends_on:
      - postgres-db
      - kafka
      - keycloak
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/school_mgmt
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: vedant@123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_KAFKA_PRODUCER_PROPERTIES_MAX_BLOCK_MS: 3000
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://school-keycloak:8080/realms/school-realm/protocol/openid-connect/certs
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8081/realms/school-realm

  frontend-ui:
    build:
      context: ./school-ui
      dockerfile: ./Dockerfile
    container_name: school-frontend
    depends_on:
      - backend-api
      - keycloak
    ports:
      - "3000:3000"

volumes:
  postgres_data: