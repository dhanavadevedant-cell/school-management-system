spring.application.name=school-management
server.port=8080

# --- Database Connection (Postgres) ---
# Uses the environment variable if present (Docker), otherwise defaults to localhost
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/school_mgmt}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:vedant@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- Keycloak Configuration ---
# Issuer URI must be reachable by both the backend and the browser
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/school-realm

# Fallback URI for JWK set
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8081/realms/school-realm/protocol/openid-connect/certs}

# --- Kafka Configuration ---
# FIX: Use 'kafka:29092' for internal container-to-container communication
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:kafka:29092}

# Producer settings
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Consumer settings
spring.kafka.consumer.group-id=school-mgmt-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# --- Kafka Timeout & Reliability Fixes ---
# Prevents the UI from hanging if Kafka is slow or unreachable
spring.kafka.producer.properties.max.block.ms=3000
spring.kafka.producer.retries=0
spring.kafka.admin.auto-create=true

# --- Logging ---
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.kafka=DEBUG